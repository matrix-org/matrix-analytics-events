name: Validate Swift

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions: {}

jobs:
  build:
    runs-on: macos-14

    concurrency:
      # When running on main, use the sha to allow all runs of this workflow to run concurrently.
      # Otherwise only allow a single run of this workflow on each branch, automatically cancelling older runs.
      group: ${{ github.ref == 'refs/heads/main' && format('swift-main-{0}', github.sha) || format('swift-{0}', github.ref) }}
      cancel-in-progress: true

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Install Swift
      uses: swift-actions/setup-swift@7ca6abe6b3b0e8b5421b88be48feee39cbf52c6a # v2.4.0
      with:
        swift-version: "6.1"

    - name: Build for Swift
      run: swift build
