name: Release Automation
on:
  workflow_dispatch:
    inputs:
      version-bump:
        description: The scale of the version bump required for semver compatibility
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
concurrency: release
jobs:
  release:
    name: "Release & Publish"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: 🧮 Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.ELEMENT_BOT_TOKEN }}
          persist-credentials: true

      - name: 🔧 Set up node environment
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: 'yarn'
          # This prevents the "Update npm" step from failing.
          node-version-file: .node-version
          registry-url: "https://registry.npmjs.org"

      # Ensure npm 11.5.1 or later is installed
      - name: Update npm
        run: npm install -g npm@latest

      - name: 🗜️ Set up python environment
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.10'

      - name: 🔨 Install Poetry
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1.4.1

      - name: 🛠️ Setup
        run: "./scripts/setup.sh"

      - name: 👊 Bump version
        run: |
          yarn version --no-git-tag-version --${GITHUB_EVENT_INPUTS_VERSION_BUMP}
          git config --global user.name 'ElementRobot'
          git config --global user.email 'releases@riot.im'
          git commit -am "${GITHUB_EVENT_INPUTS_VERSION_BUMP} version bump"
          git push
        env:
          GITHUB_EVENT_INPUTS_VERSION_BUMP: ${{ github.event.inputs.version-bump }}

      - name: 🚀 Publish to npm
        id: npm-publish
        run: |
          npm publish --access public --provenance
          echo "version=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT

      - name: 🧬 Create release
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          VERSION: ${{ steps.npm-publish.outputs.version }}
        with:
          retries: 3
          script: |
            const { VERSION: version } = process.env;
            const { owner, repo } = context.repo;

            await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: `v${version}`,
              name: `Release ${version}`,
              body: `${version} Release`,
              draft: false,
              prerelease: false,
              make_latest: "true",
            });
